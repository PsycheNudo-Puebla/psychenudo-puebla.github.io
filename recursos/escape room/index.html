<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NES Escape Room Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Press Start 2P', cursive; 
            display: flex; 
            flex-direction: row; 
            align-items: flex-start; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow-x: hidden;
            overflow-y: auto;
            gap: 10px;
        }
        #game-container { position: relative; border: 4px solid #fff; display: inline-block; }
        canvas { 
            display: block; 
            image-rendering: optimizeSpeed;             /* Firefox viejo */
            image-rendering: -moz-crisp-edges;         /* Firefox moderno */
            image-rendering: -o-crisp-edges;           /* Opera */
            image-rendering: -webkit-optimize-contrast;/* Safari */
            image-rendering: pixelated;                /* Chrome, Edge */
            image-rendering: crisp-edges;              /* Estándar futuro */
            -ms-interpolation-mode: nearest-neighbor;  /* IE */
        }
        #sidebar-position-toggle {
            display: none;
        }
        #toggle-panel-btn {
            display: none;
        }
        .pos-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff;
            font-family: inherit;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }
        .pos-btn.active,
        .pos-btn:hover {
            background: #f8b800;
            color: #000;
            border-color: #f8b800;
        }
        body.ui-left #ui-overlay { order: -1; }
        body.ui-right #ui-overlay { order: 1; }
        #ui-overlay {
            position: relative;
            margin-top: 0;
            width: 260px;
            height: 608px;
            box-sizing: border-box;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.92); border: 2px solid #fff;
            padding: 20px; font-size: 18px; line-height: 1.7;
            text-align: left;
            display: flex; flex-direction: column; justify-content: flex-start;
            white-space: normal;
        }
        @media (max-width: 1100px) {
            body { flex-direction: column; align-items: center; justify-content: flex-start; overflow-y: auto; }
            #ui-overlay { width: calc(100% - 40px); height: auto; max-height: 50vh; margin-top: 10px; }
        }
        #menu {
            position: absolute; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center;
            z-index: 10;
            overflow-y: auto;
            padding-top: 20px;
        }
        input[type="file"] { margin-top: 20px; color: #fff; }
        .btn {
            margin-top: 20px; padding: 10px 20px; background: #a80020;
            color: #fff; border: none; cursor: pointer; font-family: inherit;
        }
    </style>
</head>
<body class="ui-right">

    <div id="game-container">
        <div id="menu">
            <h1>ESCAPE ROOM</h1>
            <p>Elige un set de preguntas:</p>
            <button id="psicometriaBtn" class="btn">PSICOMETRÍA</button>
            <button id="psicopatologiaBtn" class="btn">PSICOPATOLOGÍA</button>
            <p>O carga tu propio archivo JSON:</p>
            <input type="file" id="jsonInput" accept=".json" />

            <button id="toggleControlsBtn" class="btn" style="background: #333; font-size: 10px; margin-top: 30px;">VER CONTROLES</button>
            <div id="controles-info" style="display: none; font-size: 11px; margin-top: 15px; text-align: center; line-height: 1.5; color: #aaa;">
                Flechas: Mover / Espacio: Interactuar<br>
                Enter: Pausa / Alt + P: Cambiar panel<br>
                ESC: Salir (en modo input)
            </div>

            <p style="font-size: 9px; margin-top: 50px; color: #666; text-align: center;">Creado por Alfredo Adrián González Lazcano</p>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    <div id="ui-overlay" style="display:none;"></div>

    <!-- Librerías y Sistemas de Apoyo -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="stats.js"></script>
    <script src="report.js"></script>
    <script src="main.js"></script>
    <script src="levels/level1.js"></script>
    <script src="levels/level2.js"></script>
    <script src="levels/level3.js"></script>
    <script src="levels/level4.js"></script>
    <script src="levels/level5.js"></script>
    <script src="levels/level6.js"></script>
    <script src="levels/level7.js"></script>
    <script src="levels/level8.js"></script>
</body>
</html>
