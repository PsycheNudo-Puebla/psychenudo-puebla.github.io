<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chibi GBC: Spider Trouble Final</title>
<style>
    body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; font-family: monospace; }
    #screen { border: 12px solid #333; border-radius: 8px; background: #333; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
    canvas {
        background: #9bbc0f;
        width: 850px; height: 850px;
        image-rendering: pixelated;
        display: block;
    }
</style>
</head>
<body>

<div id="screen">
    <canvas id="game" width="300" height="300"></canvas>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const PALETTE = {
    black: "#081820",
    green_dark: "#346856",
    green_mid: "#88c070",
    green_light: "#e0f8d0",
    red: "#d82800"
};

// --- ESTADO DEL JUEGO ---
let metaZone = { x: 200, y: 15, w: 85, h: 45, nextRequired: 1 };
let items = [
    { id: 1, x: 50,  y: 260, collected: false, inMeta: false, respawnTimer: 0 },
    { id: 2, x: 110, y: 240, collected: false, inMeta: false, respawnTimer: 0 },
    { id: 3, x: 180, y: 270, collected: false, inMeta: false, respawnTimer: 0 },
    { id: 4, x: 250, y: 250, collected: false, inMeta: false, respawnTimer: 0 }
];

let player = {
    x: 150, y: 150, speed: 1.8, direction: "down",
    animFrame: 0, animCounter: 0, moving: false,
    heldItem: null, isCaptured: false, idleTimer: 0
};

let spider = {
    x: 20, y: 0, state: "scanning", targetX: 20, targetY: 0,
    heldItem: null, waitTimer: 0, animFrame: 0, animCounter: 0
};

const keys = {};
window.addEventListener("keydown", e => {
    keys[e.key] = true;
    if(e.code === "Space") handleAction();
});
window.addEventListener("keyup", e => keys[e.key] = false);

function handleAction() {
    if (player.isCaptured) return;
    if (player.heldItem) {
        // ¿Está en zona de meta?
        if (player.x > metaZone.x && player.x < metaZone.x + metaZone.w &&
            player.y > metaZone.y && player.y < metaZone.y + metaZone.h) {
            if (player.heldItem.id === metaZone.nextRequired) {
                player.heldItem.inMeta = true;
                player.heldItem.x = metaZone.x + 15 + (metaZone.nextRequired * 14);
                player.heldItem.y = metaZone.y + 25;
                metaZone.nextRequired++;
                player.heldItem = null;
                return;
            }
        }
        player.heldItem.collected = false;
        player.heldItem = null;
    } else {
        let item = items.find(i => !i.collected && !i.inMeta && i.respawnTimer <= 0 && Math.hypot(i.x - player.x, i.y - player.y) < 18);
        if (item) { item.collected = true; player.heldItem = item; }
    }
}

// --- RENDERIZADO DEL PERSONAJE ---
function drawPlayer(p) {
    if (p.isCaptured && spider.heldItem !== p) return;
    ctx.save();
    ctx.translate(p.x, p.y);
    let step = (p.animFrame === 1 || p.animFrame === 3);
    if (step) ctx.translate(0, -1);

    // Brazos
    ctx.fillStyle = PALETTE.green_dark;
    let bL = (p.animFrame === 1) ? 2 : -2;
    let bR = (p.animFrame === 3) ? 2 : -2;
    ctx.fillRect(-8, bL, 3, 7); ctx.fillRect(5, bR, 3, 7);

    // Pies
    ctx.fillStyle = PALETTE.black;
    let pL = (p.animFrame === 1) ? 7 : 5;
    let pR = (p.animFrame === 3) ? 7 : 5;
    ctx.fillRect(-6, pL, 4, 4); ctx.fillRect(2, pR, 4, 4);

    // Cuerpo
    ctx.fillStyle = PALETTE.green_dark; ctx.fillRect(-6, -6, 12, 12);
    // Cabeza
    ctx.fillStyle = PALETTE.green_light; ctx.fillRect(-6, -15, 12, 10);
    // Gorra
    ctx.fillStyle = PALETTE.black;
    ctx.fillRect(-7, -17, 14, 4); ctx.fillRect(-7, -14, 14, 2);
    // Ojos
    ctx.fillRect(-3, -11, 2, 4); ctx.fillRect(1, -11, 2, 4);
    ctx.restore();
}

// --- RENDERIZADO DE LA ARAÑA ---
function drawSpider(s) {
    ctx.save();
    ctx.translate(s.x, s.y);
    // Hilo
    ctx.fillStyle = PALETTE.green_light;
    ctx.fillRect(-0.5, -s.y, 1, s.y - 5);

    let legStep = (s.animFrame % 2 === 0);
    ctx.fillStyle = PALETTE.green_dark;
    let lo = s.heldItem ? -3 : 0; // Contraer patas al cargar

    if(legStep) {
        ctx.fillRect(-10-lo, -4, 4, 2); ctx.fillRect(6+lo, -4, 4, 2);
        ctx.fillRect(-12-lo, -1, 5, 2); ctx.fillRect(7+lo, -1, 5, 2);
        ctx.fillRect(-10+lo, 3, 4, 2);  ctx.fillRect(6-lo, 3, 4, 2);
        ctx.fillRect(-8+lo, 6, 3, 3);   ctx.fillRect(5-lo, 6, 3, 3);
    } else {
        ctx.fillRect(-11-lo, -3, 4, 2); ctx.fillRect(7+lo, -3, 4, 2);
        ctx.fillRect(-13-lo, 0, 5, 2);  ctx.fillRect(8+lo, 0, 5, 2);
        ctx.fillRect(-11+lo, 4, 4, 2);  ctx.fillRect(7-lo, 4, 4, 2);
        ctx.fillRect(-7+lo, 7, 3, 2);   ctx.fillRect(4-lo, 7, 3, 2);
    }

    ctx.fillStyle = PALETTE.black;
    ctx.fillRect(-6, -6, 12, 10); ctx.fillRect(-4, 2, 8, 6);
    ctx.fillStyle = (s.heldItem === player) ? "white" : PALETTE.red;
    ctx.fillRect(-3, 5, 2, 2); ctx.fillRect(1, 5, 2, 2);
    ctx.restore();
}

function update() {
    // 1. Jugador
    if (!player.isCaptured) {
        player.moving = false;
        if (keys["ArrowUp"]) { player.y -= player.speed; player.moving = true; }
        if (keys["ArrowDown"]) { player.y += player.speed; player.moving = true; }
        if (keys["ArrowLeft"]) { player.x -= player.speed; player.moving = true; }
        if (keys["ArrowRight"]) { player.x += player.speed; player.moving = true; }
        
        if (player.moving) {
            player.idleTimer = 0;
            player.animCounter++;
            if (player.animCounter > 10) { player.animCounter = 0; player.animFrame = (player.animFrame + 1) % 4; }
        } else {
            player.animFrame = 0;
            player.idleTimer++;
        }
        if (player.heldItem) { player.heldItem.x = player.x; player.heldItem.y = player.y - 5; }
    }

    // 2. IA Araña
    switch(spider.state) {
        case "scanning":
            let target = (player.idleTimer > 180) ? player : items.find(i => !i.collected && !i.inMeta && i.respawnTimer <= 0);
            if (target) {
                if (Math.abs(spider.x - target.x) > 2) spider.x += (spider.x < target.x) ? 2 : -2;
                else { spider.state = "descending"; spider.targetY = target.y; }
            }
            break;
        case "descending":
            spider.y += 2;
            if (spider.y >= spider.targetY - 8) {
                if (player.idleTimer > 180 && Math.abs(spider.x - player.x) < 15) {
                    spider.heldItem = player; player.isCaptured = true;
                } else {
                    let itm = items.find(i => !i.collected && !i.inMeta && Math.abs(i.x - spider.x) < 12);
                    if (itm) { spider.heldItem = itm; itm.collected = true; }
                }
                spider.state = "lifting";
            }
            break;
        case "lifting":
            spider.y -= 1.5;
            if (spider.heldItem) { spider.heldItem.x = spider.x; spider.heldItem.y = spider.y + 12; }
            if (spider.y <= 0) {
                if (spider.heldItem && spider.heldItem !== player) {
                    spider.heldItem.respawnTimer = 180;
                    spider.heldItem.collected = false;
                    spider.heldItem.x = -50;
                }
                if (spider.heldItem === player) { player.isCaptured = false; player.y = 250; player.idleTimer = 0; }
                spider.heldItem = null; spider.state = "scanning";
            }
            break;
    }
    spider.animCounter++;
    if(spider.animCounter > 10) { spider.animCounter = 0; spider.animFrame++; }

    // 3. Respawn items
    items.forEach(i => {
        if (i.respawnTimer > 0) {
            i.respawnTimer--;
            if (i.respawnTimer === 0) { i.x = 30 + Math.random() * 240; i.y = 220 + Math.random() * 60; }
        }
    });
}

function draw() {
    ctx.fillStyle = PALETTE.green_mid; ctx.fillRect(0, 0, 300, 300);
    
    // Zona Meta
    ctx.strokeStyle = PALETTE.black; ctx.strokeRect(metaZone.x, metaZone.y, metaZone.w, metaZone.h);
    ctx.fillStyle = PALETTE.black; ctx.font = "10px monospace";
    ctx.fillText("ORDEN: " + metaZone.nextRequired, metaZone.x + 5, metaZone.y - 5);

    // Items
    items.forEach(i => {
        if (i.respawnTimer <= 0) {
            ctx.fillStyle = i.inMeta ? PALETTE.green_dark : PALETTE.red;
            ctx.fillRect(i.x - 5, i.y - 5, 10, 10);
            ctx.fillStyle = "white"; ctx.fillText(i.id, i.x - 3, i.y + 3);
        }
    });

    drawPlayer(player);
    drawSpider(spider);

    if (metaZone.nextRequired > 4) {
        ctx.fillStyle = PALETTE.black; ctx.font = "20px monospace";
        ctx.fillText("¡COMPLETO!", 90, 150);
    }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
