<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chibi GBC Pixel Perfect</title>
<style>
    body {
        background: #1a1a1a; /* Fondo muy oscuro para contraste */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        color: #aaaaaa;
        font-family: 'Courier New', Courier, monospace;
        overflow: hidden; /* Evitar barras de desplazamiento */
    }
    #game-container {
        position: relative;
        border: 10px solid #333;
        box-shadow: 0 0 40px rgba(0,0,0,0.8);
        border-radius: 4px;
        background: #333; /* Color del marco de la consola */
        padding: 5px;
    }
    canvas {
        background: #9bbc0f; /* Color base GBC */
        
        /* Escalado visual: 3x (900px de 300px lógicos) */
        width: 900px; 
        height: 900px;
        
        /* --- SOLUCIÓN PARA LO BORROSO: PIXEL PERFECT RENDERING --- */
        image-rendering: optimizeSpeed;             /* Firefox viejo */
        image-rendering: -moz-crisp-edges;         /* Firefox moderno */
        image-rendering: -o-crisp-edges;           /* Opera */
        image-rendering: -webkit-optimize-contrast;/* Safari */
        image-rendering: pixelated;                /* Chrome, Edge */
        image-rendering: crisp-edges;              /* Estándar futuro */
        -ms-interpolation-mode: nearest-neighbor;  /* IE */
        
        display: block; /* Evitar espacios extra extraños */
    }
    .controls-hint { 
        margin-top: 20px; 
        font-size: 16px; 
        background: rgba(255,255,255,0.1); 
        padding: 5px 15px; 
        border-radius: 15px;
    }
</style>
</head>
<body>

<div id="game-container">
    <canvas id="game" width="300" height="300"></canvas>
</div>
<div class="controls-hint">Usa las FLECHAS para caminar</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Datos del Jugador
let player = {
    x: 150, // Posición lógica
    y: 150,
    speed: 1.6,
    direction: "down",
    animFrame: 0, // Ciclo 0, 1, 2, 3
    animCounter: 0,
    moving: false
};

// Controles
const keys = {};
window.addEventListener("keydown", e => {
    keys[e.key] = true;
    if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault();
});
window.addEventListener("keyup", e => keys[e.key] = false);

// Paleta GBC Color (Modo GBC - 4 tonos básicos de verde)
const PALETTE = {
    darkest: "#081820",     // Negro/Bordes
    medium_dark: "#346856", // Ropa, Pelo, Brazos quietos
    medium_light: "#88c070",// Piel a la sombra (si lo usáramos)
    lightest: "#e0f8d0",    // Piel, Fondo
    
    accent: "#a0e080"       // Un verde ligeramente diferente para la gorra (opcional)
};

// --- Función Principal de Dibujo del Personaje ---
function drawPlayer(p) {
    ctx.save();
    
    // Posición base
    ctx.translate(p.x, p.y);

    // Mapear animFrame (0-3) a estados lógicos
    let stepActive = false;
    let stepPieA = false;
    let stepPieB = false;

    if (p.animFrame === 1) { stepActive = true; stepPieA = true; }
    if (p.animFrame === 3) { stepActive = true; stepPieB = true; }

    // 1. Sombras (Opcional, muy sutil)
    ctx.fillStyle = "rgba(0,0,0,0.1)";
    ctx.fillRect(-7, 7, 14, 3);

    // 2. Movimiento del cuerpo (Balanceo vertical)
    let bodyY = 0;
    if (stepActive) bodyY = -1; // Sube un pixel en el paso
    ctx.translate(0, bodyY);

    // DIBUJO SEGÚN DIRECCIÓN
    
    // --- VISTA FRONTAL O TRASERA ---
    if (p.direction === "down" || p.direction === "up") {
        
        // Brazos (Balanceo coordinado con los pies)
        ctx.fillStyle = PALETTE.medium_dark; // Color ropa/brazos
        let armLY = -3, armRY = -3;
        let armLH = 7, armRH = 7;

        if (p.moving) {
            if (stepPieA) { // Pie Izq adelante -> Brazo Der adelante
                armRY += 2; armRH += 1; // El brazo derecho se alarga/baja
                armLY -= 1; armLH -= 1; // El brazo izquierdo sube/encoge
            } else if (stepPieB) { // Pie Der adelante -> Brazo Izq adelante
                armLY += 2; armLH += 1;
                armRY -= 1; armRH -= 1;
            }
        }
        ctx.fillRect(-8, armLY, 3, armLH); // Brazo Izquierdo
        ctx.fillRect(5, armRY, 3, armRH);  // Brazo Derecho

        // Pies (Zapatos)
        ctx.fillStyle = PALETTE.darkest;
        let footLY = 5, footRY = 5;
        let footLH = 4, footRH = 4;
        
        if (p.moving) {
            if (stepPieA) { // Pie Izquierdo avanza
                footLY += 2; footLH += 1; // Más largo y más abajo
                footRY -= 1; footRH -= 1; // El otro sube
            } else if (stepPieB) { // Pie Derecho avanza
                footRY += 2; footRH += 1;
                footLY -= 1; footLH -= 1;
            }
        }
        ctx.fillRect(-6, footLY, 4, footLH); // Pie Izquierdo
        ctx.fillRect(2, footRY, 4, footRH);  // Pie Derecho

        // Cuerpo / Camisa
        ctx.fillStyle = PALETTE.medium_dark;
        ctx.fillRect(-6, -6, 12, 12);

        // Cabeza
        ctx.fillStyle = PALETTE.lightest; // Color Piel
        ctx.fillRect(-6, -15, 12, 10);

        // Gorra (GBC style)
        ctx.fillStyle = PALETTE.darkest; // Color principal de gorra
        ctx.fillRect(-7, -17, 14, 4);

        if (p.direction === "down") {
            // Visera frente
            ctx.fillRect(-7, -14, 14, 2);
            // Ojos
            ctx.fillStyle = PALETTE.darkest;
            ctx.fillRect(-3, -11, 2, 4); // Más altos para estilo GBC
            ctx.fillRect(1, -11, 2, 4);
        } else {
            // Pelo asomando (atrás)
            ctx.fillStyle = PALETTE.medium_dark;
            ctx.fillRect(-6, -7, 12, 2);
            // Mochila (atrás)
            ctx.fillStyle = PALETTE.darkest;
            ctx.fillRect(-4, -4, 8, 8);
        }
    } 
    // --- VISTA LATERAL (IZQUIERDA O DERECHA) ---
    else { 
        let flip = (p.direction === "left") ? -1 : 1;
        ctx.scale(flip, 1);

        // Brazo Lateral
        ctx.fillStyle = PALETTE.medium_dark;
        let armX = -3, armY = -3, armW = 4, armH = 7;
        if (p.moving) {
            if (stepPieA) armX -= 1; armH -= 1; // Hacia atrás
            if (stepPieB) armX += 1; armH += 1; // Hacia adelante
        }
        ctx.fillRect(armX, armY, armW, armH);

        // Pies Lateral
        ctx.fillStyle = PALETTE.darkest;
        let footFX = 1, footFY = 5, footFW = 5, footFH = 4; // Pie frontal (visera)
        let footBX = -3, footBY = 5, footBW = 4, footBH = 3; // Pie trasero

        if (p.moving) {
            if (stepPieA) { // Un pie avanza
                footFX += 2; footFH += 1;
                footBX -= 1; footBH -= 1;
            } else if (stepPieB) { // El otro avanza
                footFX -= 1; footFH -= 1;
                footBX += 2; footBH += 1;
            }
        }
        ctx.fillRect(footFX, footFY, footFW, footFH); // Pie hacia la visera
        ctx.fillRect(footBX, footBY, footBW, footBH); // Pie hacia atrás

        // Cuerpo lateral
        ctx.fillStyle = PALETTE.medium_dark;
        ctx.fillRect(-4, -6, 8, 12);

        // Cabeza lateral
        ctx.fillStyle = PALETTE.lightest;
        ctx.fillRect(-5, -15, 10, 10);

        // Gorra lateral
        ctx.fillStyle = PALETTE.darkest;
        ctx.fillRect(-6, -17, 12, 4); // Parte superior
        ctx.fillRect(1, -14, 6, 2);  // Visera

        // Ojo lateral
        ctx.fillStyle = PALETTE.darkest;
        ctx.fillRect(2, -11, 2, 4);
    }

    ctx.restore();
}

// --- Lógica del Juego ---

function update() {
    player.moving = false;
    let dx = 0, dy = 0;

    // Movimiento (Prioridad: Arriba/Abajo)
    if (keys["ArrowUp"]) { dy = -player.speed; player.direction = "up"; player.moving = true; }
    else if (keys["ArrowDown"]) { dy = player.speed; player.direction = "down"; player.moving = true; }
    else if (keys["ArrowLeft"]) { dx = -player.speed; player.direction = "left"; player.moving = true; }
    else if (keys["ArrowRight"]) { dx = player.speed; player.direction = "right"; player.moving = true; }

    // Aplicar movimiento
    player.x += dx;
    player.y += dy;

    // Colisión bordes lógicos (300x300)
    player.x = Math.max(10, Math.min(290, player.x));
    player.y = Math.max(20, Math.min(280, player.y));

    // Ciclo de animación (Quieto -> PieA -> Quieto -> PieB)
    if (player.moving) {
        player.animCounter++;
        // Velocidad del paso (más bajo = más rápido)
        if (player.animCounter > 10) { 
            player.animCounter = 0;
            player.animFrame = (player.animFrame + 1) % 4; // Ciclo 0, 1, 2, 3
        }
    } else {
        player.animFrame = 0; // Estado quieto
        player.animCounter = 0;
    }
}

// --- Renderizado ---

function draw() {
    // Limpiar con el color de fondo GBC (verde claro)
    ctx.fillStyle = PALETTE.lightest;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Dibujar elementos de fondo simples
    ctx.fillStyle = PALETTE.medium_light; // Verde medio para hierba/suelo
    
    // Dibujar algunas piedras o flores de adorno nítidas
    for(let i=0; i<10; i++){
        // Usar posiciones fijas basadas en el índice para que no bailen
        ctx.fillRect((i*40)%280 + 10, (i*35)%270 + 20, 4, 4);
    }

    drawPlayer(player);
}

// Bucle principal
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// Iniciar
loop();
</script>

</body>
</html>
