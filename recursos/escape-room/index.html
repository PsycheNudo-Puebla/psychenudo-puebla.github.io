<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NES Escape Room Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Press Start 2P', cursive; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        #game-container { position: relative; border: 4px solid #fff; }
        canvas { 
            display: block; 
            image-rendering: optimizeSpeed;             /* Firefox viejo */
            image-rendering: -moz-crisp-edges;         /* Firefox moderno */
            image-rendering: -o-crisp-edges;           /* Opera */
            image-rendering: -webkit-optimize-contrast;/* Safari */
            image-rendering: pixelated;                /* Chrome, Edge */
            image-rendering: crisp-edges;              /* Estándar futuro */
            -ms-interpolation-mode: nearest-neighbor;  /* IE */
        }
        #ui-overlay {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.8); border: 2px solid #fff;
            padding: 20px; font-size: 18px; line-height: 1.6;
            text-align: center;
            min-height: 80px;
            display: flex; flex-direction: column; justify-content: center;
        }
        #menu {
            position: absolute; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center;
            z-index: 10;
            overflow-y: auto;
            padding-top: 20px;
        }
        input[type="file"] { margin-top: 20px; color: #fff; }
        .btn {
            margin-top: 20px; padding: 10px 20px; background: #a80020;
            color: #fff; border: none; cursor: pointer; font-family: inherit;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="menu">
            <h1>ESCAPE ROOM</h1>
            <p>Carga tu nivel (JSON)</p>
            <p>Creado por Alfredo Adrián González Lazcano</p>
            <input type="file" id="jsonInput" accept=".json">
            <button id="startBtn" class="btn" style="display:none;">INICIAR JUEGO</button>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui-overlay" style="display:none;"></div>
    </div>

    <script src="main.js"></script>
    <script src="levels/level1.js"></script>
    <script src="levels/level2.js"></script>
    <script src="levels/level3.js"></script>
    <script src="levels/level4.js"></script>
    <script src="levels/level5.js"></script>
    <script src="levels/level6.js"></script>
    <script src="levels/level7.js"></script>
    <script src="levels/level8.js"></script>
</body>
</html>
