<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dragon GBC - Refined Tail + Human Restored</title>
<style>
    body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; font-family: monospace; }
    #screen { border: 12px solid #333; border-radius: 8px; background: #333; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
    canvas {
        background: #9bbc0f;
        width: 850px; height: 850px;
        image-rendering: pixelated;
        display: block;
    }
</style>
</head>
<body>

<div id="screen">
    <canvas id="game" width="300" height="300"></canvas>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const PALETTE = {
    black: "#081820",
    red_dragon: "#A03020",
    red_wings: "#401008",
    red_mid: "#88c070",
    red_light: "#D08060",
    yellow_base: "#f8e800",
    red_fire: "#d82800",
    orange: "#f8a800",
    amber: "#E8A030",
    crimson: "#701818",
    green_dragon: "#346856",
    green_light: "#e0f8d0"
};

let player = { x: 50, y: 150, speed: 2, animFrame: 0, animCounter: 0, moving: false, heldItem: null };
let dragon = { x: 230, y: 150, dir: 1, speed: 1.1, fireTimer: 0, mouthAnimFrame: 0 };
let cannon = { x: 100, y: 150, loaded: false };
let bullet = { x: 50, y: 260, collected: false, active: false, bx: 0, by: 0 };
let dragonFire = { active: false, x: 0, y: 0 };

const keys = {};
window.addEventListener("keydown", e => { keys[e.key] = true; if(e.code === "Space") handleAction(); });
window.addEventListener("keyup", e => keys[e.key] = false);

function handleAction() {
    if (!player.heldItem && !bullet.active && !cannon.loaded && Math.hypot(player.x - bullet.x, player.y - bullet.y) < 18) {
        bullet.collected = true; player.heldItem = bullet;
    } else if (player.heldItem && Math.hypot(player.x - cannon.x, player.y - cannon.y) < 20) {
        cannon.loaded = true; player.heldItem = null; bullet.collected = false; bullet.x = -100;
    } else if (cannon.loaded && Math.hypot(player.x - cannon.x, player.y - cannon.y) < 20) {
        bullet.active = true; bullet.bx = cannon.x + 10; bullet.by = cannon.y; cannon.loaded = false;
    }
}

function drawDragonHead(ctx, mouthOpen) {
    const neckX = 2, centerY = 0;
    const snoutX = -22;
    
    ctx.fillStyle = PALETTE.red_dragon;
    ctx.beginPath();
    ctx.moveTo(neckX + 2, centerY - 5);
    ctx.lineTo(-2, centerY - 8);
    ctx.lineTo(-12, centerY - 7);
    ctx.lineTo(snoutX + 8, centerY - 4);
    ctx.lineTo(snoutX + 2, centerY - 1);
    ctx.lineTo(snoutX + 4, centerY + 1);
    ctx.lineTo(-10, centerY + 1);
    ctx.lineTo(-2, centerY + 2);
    ctx.lineTo(neckX + 2, centerY);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = PALETTE.red_light;
    ctx.fillRect(-6, centerY - 7, 2, 1);
    ctx.fillRect(-11, centerY - 6, 2, 1);
    
    ctx.fillStyle = PALETTE.red_light;
    ctx.fillRect(-11, centerY - 9, 10, 1);
    
    ctx.fillStyle = PALETTE.amber;
    ctx.beginPath();
    ctx.moveTo(-10, centerY - 7);
    ctx.lineTo(-7, centerY - 8);
    ctx.lineTo(-6, centerY - 7);
    ctx.lineTo(-7, centerY - 6);
    ctx.lineTo(-10, centerY - 7);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = PALETTE.black;
    ctx.fillRect(-8, centerY - 8, 1, 3);
    
    ctx.fillStyle = PALETTE.yellow_base;
    ctx.fillRect(-9, centerY - 8, 1, 1);
    
    ctx.fillStyle = PALETTE.crimson;
    ctx.beginPath();
    ctx.moveTo(-11, centerY - 9);
    ctx.lineTo(-7, centerY - 10);
    ctx.lineTo(-6, centerY - 9);
    ctx.lineTo(-10, centerY - 8);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = PALETTE.red_light;
    ctx.beginPath(); ctx.moveTo(1, centerY-8); ctx.lineTo(5, centerY-16); ctx.lineTo(3, centerY-16); ctx.lineTo(-1, centerY-9); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-6, centerY-7); ctx.lineTo(-3, centerY-13); ctx.lineTo(-5, centerY-13); ctx.lineTo(-8, centerY-7); ctx.closePath(); ctx.fill();
    ctx.fillStyle = PALETTE.black;
    ctx.fillRect(3, centerY-16, 2, 2); ctx.fillRect(-5, centerY-13, 2, 2);
    
    ctx.fillStyle = PALETTE.red_dragon; ctx.fillRect(0, centerY-5, 5, 11);
    ctx.fillStyle = PALETTE.black; ctx.fillRect(1, centerY-4, 2, 1); ctx.fillRect(3, centerY-2, 2, 1); ctx.fillRect(1, centerY+3, 2, 1);
    
    ctx.fillStyle = PALETTE.red_dragon;
    if (mouthOpen) {
        ctx.beginPath();
        ctx.moveTo(neckX + 2, centerY + 1);
        ctx.lineTo(-2, centerY + 4);
        ctx.lineTo(-10, centerY + 5);
        ctx.lineTo(snoutX + 10, centerY + 6);
        ctx.lineTo(snoutX + 4, centerY + 5);
        ctx.lineTo(snoutX + 6, centerY + 3);
        ctx.lineTo(-10, centerY + 3);
        ctx.lineTo(-2, centerY + 2);
        ctx.lineTo(neckX + 2, centerY + 3);
        ctx.closePath();
        ctx.fill();
        
        ctx.fillStyle = PALETTE.black;
        ctx.fillRect(-4, centerY+5, 2, 1); ctx.fillRect(-9, centerY+5, 2, 1);
        
        ctx.fillStyle = PALETTE.red_light;
        ctx.fillRect(snoutX + 5, centerY, 1, 2);
        
    } else {
        ctx.beginPath();
        ctx.moveTo(neckX + 2, centerY + 1);
        ctx.lineTo(-2, centerY + 2);
        ctx.lineTo(-10, centerY + 3);
        ctx.lineTo(snoutX + 10, centerY + 4);
        ctx.lineTo(snoutX + 4, centerY + 3);
        ctx.lineTo(snoutX + 6, centerY + 1);
        ctx.lineTo(-10, centerY + 1);
        ctx.lineTo(-2, centerY + 2);
        ctx.lineTo(neckX + 2, centerY + 3);
        ctx.closePath();
        ctx.fill();
        
        ctx.strokeStyle = PALETTE.black; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(neckX, centerY + 1); ctx.lineTo(snoutX + 6, centerY + 2); ctx.stroke();
        
        ctx.fillStyle = PALETTE.black;
        ctx.fillRect(snoutX + 3, centerY + 1, 1, 1);
    }
}

function drawBatWing(ctx, side, flap) {
    const bx = side * 2;
    const by = -4;
    const f = flap * side * 0.5;
    
    const bones = [
        {x: bx + side*20, y: by - 30 + f},
        {x: bx + side*16, y: by - 20 + f},
        {x: bx + side*11, y: by - 12 + f},
    ];
    
    ctx.fillStyle = PALETTE.red_wings;
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(bones[0].x, bones[0].y);
    ctx.lineTo(bones[0].x + side*2, bones[0].y + 2*side);
    ctx.lineTo(bones[1].x, bones[1].y);
    ctx.lineTo(bones[1].x + side*2, bones[1].y + 2*side);
    ctx.lineTo(bones[2].x, bones[2].y);
    ctx.lineTo(bones[2].x + side*2, bones[2].y + 2*side);
    ctx.lineTo(bx, by + 6);
    ctx.closePath();
    ctx.fill();
    
    ctx.strokeStyle = PALETTE.red_light;
    ctx.lineWidth = 1.5;
    bones.forEach(b => {
        ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(b.x, b.y); ctx.stroke();
    });
    
    ctx.fillStyle = PALETTE.red_light;
    ctx.fillRect(bones[0].x-1, bones[0].y-1, 3, 3);
    ctx.fillRect(bones[1].x-1, bones[1].y-1, 3, 3);
    ctx.fillRect(bones[2].x-1, bones[2].y-1, 3, 3);
    
    ctx.fillStyle = PALETTE.black;
    ctx.fillRect(bones[0].x + side*2 - 1, bones[0].y + 2*side, 2, 2);
    ctx.fillRect(bones[1].x + side*2 - 1, bones[1].y + 2*side, 2, 2);
    ctx.fillRect(bones[2].x + side*2 - 1, bones[2].y + 2*side, 2, 2);
    
    ctx.strokeStyle = PALETTE.black;
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(bones[0].x, bones[0].y + side); ctx.lineTo(bones[1].x, bones[1].y + side); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bones[1].x, bones[1].y + side); ctx.lineTo(bones[2].x, bones[2].y + side); ctx.stroke();
}

// ═══════════════════════════════════════
//  COLA MEJORADA - NUEVO DISEÑO
// ═══════════════════════════════════════
function drawDragonTail(ctx) {
    // Segmentos que se afinan progresivamente con curva natural
    const segments = [
        {x: 15, y: -4, w: 8, h: 4},   // Base
        {x: 22, y: -7, w: 7, h: 4},   // Segundo
        {x: 29, y: -11, w: 7, h: 4},  // Tercero
        {x: 35, y: -15, w: 5, h: 3},  // Cuarto (más fino)
    ];
    
    // Dibujar segmentos con curva
    segments.forEach((s, i) => {
        ctx.fillStyle = i % 2 === 0 ? PALETTE.red_dragon : PALETTE.crimson;
        ctx.fillRect(s.x, s.y, s.w, s.h);
        
        // Espinas en el lomo (continúan desde el cuerpo)
        if (i < 3) {
            ctx.fillStyle = PALETTE.red_light;
            ctx.fillRect(s.x + 2, s.y - 1, 2, 2);
        }
    });
    
    // Punta de la cola - forma de lanza/elaborada
    ctx.fillStyle = PALETTE.red_dragon;
    ctx.beginPath();
    ctx.moveTo(40, -15);       // Base superior
    ctx.lineTo(50, -17);       // Punta superior
    ctx.lineTo(52, -15);       // Centro punta
    ctx.lineTo(50, -13);       // Punta inferior
    ctx.lineTo(40, -12);       // Base inferior
    ctx.closePath();
    ctx.fill();
    
    // Detalle punta
    ctx.fillStyle = PALETTE.red_light;
    ctx.fillRect(49, -16, 2, 2); // Brillo punta
    ctx.fillRect(48, -14, 1, 2); // Sombra interior
    
    // Espina final grande
    ctx.fillStyle = PALETTE.red_light;
    ctx.beginPath();
    ctx.moveTo(42, -15);
    ctx.lineTo(45, -19);
    ctx.lineTo(44, -19);
    ctx.lineTo(41, -16);
    ctx.closePath();
    ctx.fill();
    
    // Segmentos articulaciones
    ctx.fillStyle = PALETTE.black;
    ctx.fillRect(21, -5, 1, 2);
    ctx.fillRect(28, -9, 1, 2);
    ctx.fillRect(34, -13, 1, 2);
}

function drawDragon(d) {
    ctx.save();
    ctx.translate(d.x, d.y);
    let hover = Math.sin(Date.now() / 300) * 3;
    let wingMove = Math.sin(Date.now() / 150) * 5;
    ctx.translate(0, hover);

    // Alas murciélago
    drawBatWing(ctx, 1, wingMove);
    drawBatWing(ctx, -1, wingMove);

    // Cuerpo rojo
    ctx.fillStyle = PALETTE.red_dragon; 
    ctx.fillRect(-15, -6, 30, 14); 
    
    // Línea amarilla con pliegues
    ctx.fillStyle = PALETTE.yellow_base;
    for(let x = -14; x <= 14; x += 2) {
        ctx.fillRect(x, 6, 1, 3);
    }
    ctx.fillStyle = PALETTE.black;
    for(let x = -13; x <= 13; x += 4) {
        ctx.fillRect(x, 6, 1, 2);
    }
    
    // Escamas lomo
    ctx.fillStyle = PALETTE.red_light;
    for(let i = -12; i < 14; i += 4) {
        ctx.fillRect(i, -7, 2, 2);
    }
    
    // ═══ COLA MEJORADA ═══
    drawDragonTail(ctx);

    // Cuello
    ctx.fillStyle = PALETTE.red_dragon; ctx.fillRect(-29, -5, 16, 10);
    ctx.fillStyle = PALETTE.red_light; ctx.fillRect(-22, -5, 2, 2); ctx.fillRect(-14, -5, 2, 2);
    ctx.fillStyle = PALETTE.black; ctx.fillRect(-24, -4, 2, 2); ctx.fillRect(-16, -4, 2, 2);

    // Cabeza
    ctx.translate(-29, -5); 
    drawDragonHead(ctx, d.mouthAnimFrame === 1);
    
    ctx.restore();
}

// ═══════════════════════════════════════
//  PERSONAJE HUMANO - COLORES ORIGINALES
// ═══════════════════════════════════════
function drawPlayer(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    if (p.animFrame === 1 || p.animFrame === 3) ctx.translate(0, -1);
    
    // Piernas
    ctx.fillStyle = PALETTE.green_dragon; 
    ctx.fillRect(-8, (p.animFrame===1?2:-2), 3, 7); 
    ctx.fillRect(5, (p.animFrame===3?2:-2), 3, 7);
    
    // Botas
    ctx.fillStyle = PALETTE.black; 
    ctx.fillRect(-6, (p.animFrame===1?7:5), 4, 4); 
    ctx.fillRect(2, (p.animFrame===3?7:5), 4, 4);
    
    // Cuerpo (túnica verde)
    ctx.fillStyle = PALETTE.green_dragon; 
    ctx.fillRect(-6, -6, 12, 12);
    
    // Cabeza
    ctx.fillStyle = PALETTE.green_light; 
    ctx.fillRect(-6, -15, 12, 10);
    
    // Casco/cabello
    ctx.fillStyle = PALETTE.black; 
    ctx.fillRect(-7, -17, 14, 4); 
    ctx.fillRect(-7, -14, 14, 2);
    
    ctx.restore();
}

function update() {
    if (keys["ArrowUp"]) player.y -= player.speed;
    if (keys["ArrowDown"]) player.y += player.speed;
    if (keys["ArrowLeft"]) player.x -= player.speed;
    if (keys["ArrowRight"]) player.x += player.speed;
    player.moving = (keys["ArrowUp"] || keys["ArrowDown"] || keys["ArrowLeft"] || keys["ArrowRight"]);
    if (player.moving) {
        player.animCounter++;
        if (player.animCounter > 10) { player.animCounter = 0; player.animFrame = (player.animFrame + 1) % 4; }
    } else player.animFrame = 0;
    if (player.heldItem) { bullet.x = player.x; bullet.y = player.y - 10; }
    dragon.y += dragon.speed * dragon.dir;
    if (dragon.y > 240 || dragon.y < 60) dragon.dir *= -1;
    dragon.fireTimer++;
    dragon.mouthAnimFrame = (dragon.fireTimer > 85) ? 1 : 0;
    if (dragon.fireTimer > 100) {
        dragonFire.active = true;
        dragonFire.x = dragon.x - 50; dragonFire.y = dragon.y - 3;
        dragon.fireTimer = 0;
    }
    if (dragonFire.active) { dragonFire.x -= 4; if (dragonFire.x < -20) dragonFire.active = false; }
    if (bullet.active) { bullet.bx += 5; if (bullet.bx > 320) { bullet.active = false; bullet.x = 50; bullet.y = 260; } }
}

function draw() {
    ctx.fillStyle = PALETTE.red_mid; ctx.fillRect(0, 0, 300, 300);
    ctx.save();
    ctx.translate(cannon.x, cannon.y);
    ctx.fillStyle = PALETTE.red_dragon; ctx.fillRect(-8, 5, 16, 6);
    ctx.fillStyle = cannon.loaded ? PALETTE.red_fire : PALETTE.black;
    ctx.fillRect(-6, -6, 22, 12);
    ctx.fillStyle = PALETTE.black; ctx.fillRect(14, -8, 4, 16);
    ctx.restore();

    drawDragon(dragon);

    if (!bullet.collected && !bullet.active && !cannon.loaded) {
        ctx.fillStyle = PALETTE.black; ctx.fillRect(bullet.x - 4, bullet.y - 4, 8, 8);
    }
    if (dragonFire.active) {
        ctx.fillStyle = (Date.now() % 200 < 100) ? PALETTE.orange : PALETTE.red_fire;
        ctx.fillRect(dragonFire.x, dragonFire.y - 4, 14, 9);
    }
    if (bullet.active) { ctx.fillStyle = PALETTE.black; ctx.fillRect(bullet.bx, bullet.by - 3, 7, 7); }
    drawPlayer(player);
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
