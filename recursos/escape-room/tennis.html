<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inferno Tennis - Physics Refined</title>
<style>
    body { background: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: monospace; color: #e0f8d0; overflow: hidden; }
    #hud { margin-bottom: 10px; font-size: 20px; background: #333; padding: 10px 20px; border-radius: 4px; border: 2px solid #555; }
    #game-container { position: relative; border: 8px solid #333; background: #333; }
    canvas { background: #9bbc0f; width: 600px; height: 600px; image-rendering: pixelated; display: block; }
    #quiz-overlay { position: absolute; background: rgba(8, 24, 32, 0.95); border: 4px solid #e0f8d0; padding: 20px; display: none; width: 350px; text-align: center; z-index: 10; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .btn-opt { background: #346856; border: 2px solid #e0f8d0; color: #e0f8d0; padding: 10px; margin: 5px; cursor: pointer; display: block; width: 100%; font-family: inherit; }
    .btn-opt:hover { background: #e0f8d0; color: #081820; }
    #message { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 24px; pointer-events: none; display: none; text-shadow: 2px 2px #000; }
</style>
</head>
<body>

<div id="hud">VIDAS: <span id="lives" style="color:#d82800">2</span> | NIVEL: <span id="level">1</span></div>

<div id="game-container">
    <div id="message">¡PREPÁRATE!</div>
    <div id="quiz-overlay">
        <h3 id="question-text">¿?</h3>
        <div id="options-container"></div>
    </div>
    <canvas id="game" width="300" height="300"></canvas>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const PALETTE = { darkest: "#081820", medium_dark: "#346856", lightest: "#e0f8d0", wood: "#5e3a25", red: "#d82800", orange: "#f8a800" };

let gameState = "prep"; 
let lives = 2;
let level = 1;
let gameSpeed = 1.0;
const MAX_SPEED = 2.5;

let player = { x: 130, y: 240, w: 50, h: 6, speed: 3.5, animFrame: 0, animCounter: 0, moving: false };
let devil = { x: 130, y: 45, w: 50, h: 6, speed: 0, maxSpeed: 2.2, animFrame: 0, animCounter: 0 };
let bomb = { x: 150, y: 150, vx: 1.5, vy: 1.8, r: 5, angle: 0 };
let particles = [];

const questions = [
    { q: "¿En qué estado se encuentra Puebla?", a: ["Puebla", "Tlaxcala", "Veracruz"], c: 0 },
    { q: "¿Qué software usa el profesor?", a: ["Windows", "Linux", "macOS"], c: 1 },
    { q: "¿Qué auto VW repara el profesor?", a: ["Jetta", "Passat CC", "Golf"], c: 1 }
];

const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

function createExplosion(x, y) {
    for(let i=0; i<20; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5,
            life: 25,
            color: Math.random() > 0.5 ? PALETTE.red : PALETTE.orange
        });
    }
}

function drawChibi(p, isDevil) {
    ctx.save();
    ctx.translate(p.x + p.w/2, p.y);
    let step = (p.animFrame === 1 || p.animFrame === 3) ? -1 : 0;
    ctx.translate(0, step);

    let mainColor = isDevil ? PALETTE.red : PALETTE.medium_dark;
    ctx.fillStyle = mainColor;
    let armY = isDevil ? 0 : -3;
    if (p.animFrame === 1) armY += 2;
    if (p.animFrame === 3) armY -= 1;
    ctx.fillRect(-15, armY, 3, 7); ctx.fillRect(12, armY, 3, 7);

    ctx.fillStyle = PALETTE.darkest;
    let fY = isDevil ? -18 : 5;
    ctx.fillRect(-6, fY + (p.animFrame===1?2:0), 4, 4);
    ctx.fillRect(2, fY + (p.animFrame===3?2:0), 4, 4);

    ctx.fillStyle = mainColor; ctx.fillRect(-6, isDevil ? -12 : -6, 12, 12);
    ctx.fillStyle = isDevil ? PALETTE.red : PALETTE.lightest; ctx.fillRect(-6, isDevil ? -10 : -15, 12, 10);

    if(!isDevil) {
        ctx.fillStyle = PALETTE.darkest; ctx.fillRect(-7,-17,14,4); ctx.fillRect(-4,-4,8,8);
    } else {
        ctx.fillStyle = PALETTE.black; ctx.fillRect(-7,-12,14,4);
        ctx.fillStyle = PALETTE.red; ctx.fillRect(-10,-10,3,3); ctx.fillRect(7,-10,3,3);
        ctx.fillStyle = PALETTE.black; ctx.fillRect(-3,-7,2,3); ctx.fillRect(1,-7,2,3);
    }
    ctx.restore();
}

function startPrep() {
    gameState = "prep";
    document.getElementById("message").style.display = "block";
    setTimeout(() => {
        document.getElementById("message").style.display = "none";
        gameState = "play";
    }, 1000);
}

function update() {
    if (gameState === "prep" || gameState === "quiz") return;

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life--;
        if(p.life <= 0) particles.splice(i, 1);
    });

    if (gameState === "explosion") {
        if(particles.length === 0) startPrep();
        return;
    }

    // Jugador
    player.moving = false;
    if (keys["ArrowLeft"] && player.x > 0) { player.x -= player.speed; player.moving = true; }
    if (keys["ArrowRight"] && player.x < canvas.width - player.w) { player.x += player.speed; player.moving = true; }

    if (player.moving) {
        player.animCounter++;
        if (player.animCounter > 8) { player.animFrame = (player.animFrame + 1) % 4; player.animCounter = 0; }
    } else player.animFrame = 0;

    // Diablo (IA con Suavizado)
    let dCenter = devil.x + devil.w/2;
    let diff = bomb.x - dCenter;
    if (Math.abs(diff) > 5) {
        devil.speed = Math.sign(diff) * devil.maxSpeed;
        devil.x += devil.speed;
        devil.animCounter++;
        if (devil.animCounter > 8) { devil.animFrame = (devil.animFrame+1)%4; devil.animCounter = 0; }
    } else {
        devil.speed = 0;
        devil.animFrame = 0;
    }

    // Movimiento Bomba
    bomb.x += bomb.vx; bomb.y += bomb.vy;

    // Bordes Laterales
    if (bomb.x - bomb.r < 0) { bomb.x = bomb.r; bomb.vx *= -1; }
    if (bomb.x + bomb.r > 300) { bomb.x = 300 - bomb.r; bomb.vx *= -1; }

    // Colisión Jugador (Perfeccionada)
    if (bomb.vy > 0 && bomb.y + bomb.r > player.y && bomb.y < player.y + player.h && 
        bomb.x > player.x && bomb.x < player.x + player.w) {
        
        let hit = (bomb.x - (player.x + player.w/2)) / (player.w/2);
        bomb.vx = hit * 4; 
        bomb.vy = -Math.abs(bomb.vy) * 1.05; 
        bomb.y = player.y - bomb.r; // Sacar de la raqueta para evitar bug
    }

    // Colisión Diablo (Perfeccionada)
    if (bomb.vy < 0 && bomb.y - bomb.r < devil.y + devil.h && bomb.y > devil.y && 
        bomb.x > devil.x && bomb.x < devil.x + devil.w) {
        
        bomb.vy = Math.abs(bomb.vy); 
        bomb.y = devil.y + devil.h + bomb.r; // Sacar de la raqueta para evitar bug
    }

    if (bomb.y < 0) { gameState = "quiz"; launchQuiz(); }
    if (bomb.y > 300) { lives--; document.getElementById("lives").innerText = lives; resetBomb(); startPrep(); }
    if (lives <= 0) { alert("EL DIABLO HA RECLAMADO TU ALMA"); location.reload(); }
}

function launchQuiz() {
    const q = questions[Math.floor(Math.random() * questions.length)];
    const overlay = document.getElementById("quiz-overlay");
    overlay.style.display = "block";
    document.getElementById("question-text").innerText = q.q;
    const container = document.getElementById("options-container");
    container.innerHTML = "";
    q.a.forEach((opt, idx) => {
        const b = document.createElement("button");
        b.className = "btn-opt"; b.innerText = opt;
        b.onclick = () => {
            overlay.style.display = "none";
            if (idx === q.c) {
                createExplosion(bomb.x, bomb.y);
                gameState = "explosion";
                level++; if(gameSpeed < MAX_SPEED) gameSpeed += 0.15;
                document.getElementById("level").innerText = level;
            } else {
                lives--; document.getElementById("lives").innerText = lives;
                gameState = "prep";
                startPrep();
            }
            resetBomb();
        };
        container.appendChild(b);
    });
}

function resetBomb() {
    bomb.x = 150; bomb.y = 150;
    bomb.vx = (Math.random() - 0.5) * 4; bomb.vy = 2 * gameSpeed;
}

function draw() {
    ctx.fillStyle = PALETTE.lightest; ctx.fillRect(0, 0, 300, 300);
    ctx.strokeStyle = PALETTE.medium_dark; ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(0, 150); ctx.lineTo(300, 150); ctx.stroke();
    
    ctx.fillStyle = PALETTE.wood;
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fillRect(devil.x, devil.y, devil.w, devil.h);

    drawChibi(player, false);
    drawChibi(devil, true);

    if (gameState !== "explosion") {
        ctx.save();
        ctx.translate(bomb.x, bomb.y); ctx.rotate(bomb.angle);
        ctx.fillStyle = PALETTE.darkest;
        ctx.beginPath(); ctx.arc(0, 0, bomb.r, 0, Math.PI*2); ctx.fill();
        if (gameState !== "quiz") {
            ctx.strokeStyle = PALETTE.orange; ctx.beginPath(); ctx.moveTo(0, -4); ctx.lineTo(4, -8); ctx.stroke();
            bomb.angle += 0.15;
        }
        ctx.restore();
    }

    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 2, 2);
    });
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
startPrep();
loop();
</script>
</body>
</html>
