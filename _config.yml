title: "PsycheNudo Puebla"
description: "Nodo de Difusión Académica, Tecnología Educativa y Ética Clínica"
url: "https://psychenudo-puebla.github.io"
baseurl: ""

# Build settings
# Sin theme de terceros: el sitio usa _layouts/default.html y css/estilos.css (evita solaparse con Minima en GitHub Pages).
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed

# Collections
collections:
  articulos:
    output: true
    permalink: /articulos/:name/
  profesionales:
    output: true
    permalink: /profesionales/:name/

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - .bundle