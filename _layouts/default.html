<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/css/estilos.css' | relative_url }}">
</head>
<body>

    <header class="site-header">
        <a href="{{ '/' | relative_url }}" class="logo-link">
            <img src="{{ '/assets/logo-psychenudo.png' | relative_url }}" alt="PsycheNudo Puebla Logo" class="logo-img">
        </a>
        <p>{{ site.description }}</p>
    </header>

    <main class="contenedor">
        {{ content }}
    </main>

    <footer class="site-footer">
        <p>{{ site.title }} &copy; 2026</p>
        <p><strong>Aviso Legal:</strong> Este sitio es una plataforma de difusión. La práctica clínica es responsabilidad individual de cada profesional. Se recomienda verificar la cédula profesional en el Registro Nacional de Profesionistas.</p>
    </footer>

</body>
</html>
