<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/css/estilos.css' | relative_url }}">
</head>
<body>

    <header class="site-header">
        <a href="{{ '/' | relative_url }}" class="logo-link">
            <img src="{{ '/assets/logo-psychenudo.png' | relative_url }}" alt="PsycheNudo Puebla Logo" class="logo-img">
        </a>
        <p>{{ site.description }}</p>
    </header>

    <main class="contenedor">
        {{ content }}
    </main>

    <footer class="site-footer">
        <p>{{ site.title }} &copy; 2026</p>
        <p style="font-size: 0.85rem; margin-top: 15px; color: var(--color-texto-claro); max-width: 800px; margin-left: auto; margin-right: auto; line-height: 1.4;">
            <strong>Aviso Legal:</strong> PsycheNudo Puebla es una plataforma de difusión académica y gremial. 
            El contenido de los artículos y perfiles es responsabilidad exclusiva de sus autores y no constituye supervisión clínica.
        </p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const enlaces = document.querySelectorAll('a[href^="http"]');
            enlaces.forEach(function(enlace) {
                const href = enlace.getAttribute('href');
                if (href && !href.includes('psychenudo-puebla.github.io') && !href.includes(window.location.hostname)) {
                    enlace.setAttribute('target', '_blank');
                    enlace.setAttribute('rel', 'noopener noreferrer');
                }
            });
        });
    </script>
</body>
</html>
